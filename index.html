<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>报告中心</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1a1612;
      --paper: #f5f0e8;
      --accent: #c8401a;
      --accent2: #2a5f8f;
      --muted: #8a7f72;
      --rule: #d4c9b8;
      --sidebar-w: 230px;
      --header-h: 58px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Noto Serif SC', serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      height: var(--header-h);
      background: var(--ink);
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      gap: 1.2rem;
      border-bottom: 3px solid var(--accent);
      flex-shrink: 0;
      z-index: 100;
    }

    .header-logo-wrap {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    .header-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }

    .header-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 900;
      color: var(--paper);
      letter-spacing: -0.02em;
      white-space: nowrap;
      line-height: 1;
    }

    .header-logo span { color: var(--accent); }

    .header-divider {
      width: 1px;
      height: 22px;
      background: rgba(255,255,255,0.15);
    }

    .header-breadcrumb {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: rgba(255,255,255,0.4);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-breadcrumb span {
      color: rgba(255,255,255,0.75);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-left: auto;
    }

    .btn-open {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.35rem 0.8rem;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
      display: none;
    }

    .btn-open:hover { background: rgba(255,255,255,0.18); color: white; }
    .btn-open.visible { display: inline-block; }

    .header-search {
      position: relative;
    }

    #search-input {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      padding: 0.38rem 0.8rem 0.38rem 1.9rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: white;
      width: 160px;
      outline: none;
      transition: all 0.2s;
    }

    #search-input::placeholder { color: rgba(255,255,255,0.3); }
    #search-input:focus { background: rgba(255,255,255,0.13); border-color: rgba(255,255,255,0.35); }

    .search-icon {
      position: absolute;
      left: 0.55rem;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.35);
      font-size: 0.8rem;
      pointer-events: none;
    }

    /* ── BODY LAYOUT ── */
    .body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    aside {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: white;
      border-right: 1px solid var(--rule);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TREND ANALYSIS SECTION (pinned top) ── */
    .trend-section {
      flex-shrink: 0;
      border-bottom: 2px solid var(--rule);
      background: rgba(42,95,143,0.04);
    }

    .trend-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1rem 0.5rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.12s;
    }

    .trend-header:hover { background: rgba(42,95,143,0.06); }

    .trend-header-left {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .trend-icon {
      font-size: 0.75rem;
      line-height: 1;
    }

    .trend-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent2);
    }

    .trend-chevron {
      font-size: 0.55rem;
      color: var(--accent2);
      opacity: 0.6;
      transition: transform 0.2s;
    }

    .trend-header.open .trend-chevron { transform: rotate(90deg); }

    .trend-body { display: none; padding-bottom: 0.4rem; }
    .trend-body.open { display: block; }

    .trend-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.32rem 1rem 0.32rem 2rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.66rem;
      color: var(--muted);
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: all 0.12s;
      user-select: none;
    }

    .trend-link:hover { color: var(--accent2); background: rgba(42,95,143,0.05); }

    .trend-link.active {
      color: var(--accent2);
      border-left-color: var(--accent2);
      background: rgba(42,95,143,0.08);
      font-weight: 500;
    }

    .trend-link-date {
      font-size: 0.58rem;
      color: var(--rule);
      white-space: nowrap;
    }

    .trend-link.active .trend-link-date { color: var(--accent2); opacity: 0.6; }

    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem 0 1.5rem;
    }

    .brand-section { margin-bottom: 0.2rem; }

    .brand-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.55rem 1rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.12s;
    }

    .brand-toggle:hover { background: rgba(26,22,18,0.04); }

    .brand-toggle-name {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .brand-chevron {
      font-size: 0.55rem;
      color: var(--muted);
      transition: transform 0.2s;
    }

    .brand-toggle.open .brand-chevron { transform: rotate(90deg); }

    .brand-body { display: none; }
    .brand-body.open { display: block; }

    .type-label-small {
      font-family: 'DM Mono', monospace;
      font-size: 0.57rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.45rem 1rem 0.15rem 1.6rem;
    }

    .nav-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.32rem 1rem 0.32rem 1.8rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.66rem;
      color: var(--muted);
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: all 0.12s;
      user-select: none;
    }

    .nav-link:hover { color: var(--ink); background: rgba(26,22,18,0.03); }

    .nav-link.active {
      color: var(--accent2);
      border-left-color: var(--accent2);
      background: rgba(42,95,143,0.06);
    }

    .nav-link.active.monthly {
      color: var(--accent);
      border-left-color: var(--accent);
      background: rgba(200,64,26,0.06);
    }

    .nav-link-date {
      font-size: 0.58rem;
      color: var(--rule);
      white-space: nowrap;
    }

    .nav-link.active .nav-link-date { color: inherit; opacity: 0.6; }

    /* ── MAIN PANEL ── */
    .main-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--paper);
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      color: var(--muted);
    }

    .empty-icon { font-size: 2.5rem; opacity: 0.3; }

    .empty-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: var(--ink);
      opacity: 0.3;
    }

    .empty-sub {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      opacity: 0.6;
    }

    .iframe-wrap {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    .iframe-wrap.visible { display: flex; }

    .iframe-toolbar {
      height: 36px;
      background: white;
      border-bottom: 1px solid var(--rule);
      display: flex;
      align-items: center;
      padding: 0 1rem;
      gap: 0.8rem;
      flex-shrink: 0;
    }

    .iframe-title {
      font-family: 'DM Mono', monospace;
      font-size: 0.66rem;
      color: var(--ink);
      flex: 1;
    }

    .iframe-title .brand-tag {
      color: var(--muted);
      margin-right: 0.4rem;
    }

    .iframe-date {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      color: var(--muted);
    }

    #report-frame {
      flex: 1;
      border: none;
      background: white;
    }

    .search-results {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: none;
    }

    .search-results.visible { display: block; }

    .search-result-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1rem;
      background: white;
      border: 1px solid var(--rule);
      margin-bottom: 1px;
      cursor: pointer;
      transition: background 0.12s;
    }

    .search-result-item:hover { background: #fffdf9; }

    .sr-brand {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      width: 70px;
      flex-shrink: 0;
    }

    .sr-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 0.88rem;
      font-weight: 600;
      flex: 1;
    }

    .sr-date {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      color: var(--muted);
    }

    .sr-type {
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      padding: 0.15rem 0.5rem;
      border: 1px solid var(--rule);
      color: var(--muted);
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-logo-wrap">
    <div class="header-eyebrow">Report Portal</div>
    <div class="header-logo">报告<span>中心</span></div>
  </div>
  <div class="header-divider"></div>
  <div class="header-breadcrumb" id="header-breadcrumb">← 选择左侧报告预览</div>
  <div class="header-actions">
    <a class="btn-open" id="btn-open-tab" href="#" target="_blank">↗ 新标签打开</a>
    <div class="header-search">
      <span class="search-icon">⌕</span>
      <input id="search-input" type="text" placeholder="搜索…" oninput="applySearch()" />
    </div>
  </div>
</header>

<!-- BODY -->
<div class="body">

  <!-- SIDEBAR -->
  <aside>
    <!-- TREND ANALYSIS (pinned top) -->
    <div class="trend-section" id="trend-section"></div>

    <!-- BRAND NAV -->
    <div class="sidebar-nav" id="sidebar-nav"></div>
  </aside>

  <!-- MAIN PANEL -->
  <div class="main-panel">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">📄</div>
      <div class="empty-title">选择一份报告</div>
      <div class="empty-sub">从左侧选择报告，将在此处直接预览</div>
    </div>

    <div class="search-results" id="search-results"></div>

    <div class="iframe-wrap" id="iframe-wrap">
      <div class="iframe-toolbar">
        <div class="iframe-title" id="iframe-title"></div>
        <div class="iframe-date" id="iframe-date"></div>
      </div>
      <iframe id="report-frame" src="" title="报告预览"></iframe>
    </div>
  </div>
</div>

<script>
  // ══════════════════════════════════════════════════
  //  ✏️  Trend Analysis reports (newest first)
  // ══════════════════════════════════════════════════
  const TREND_ANALYSIS = [
    { title: 'USC Funnel Trend', date: '2026-07-03', uploaded: '2026-07-03', file: 'USC Funnel Trend Analysis_20260703.html' },
  ];

  // ══════════════════════════════════════════════════
  //  ✏️  Brand reports (newest first)
  // ══════════════════════════════════════════════════
  const REPORTS = [
    { brand: 'OK188KH', type: 'weekly',  title: 'Week 21',  date: '2026-05-25 ~ 2026-05-31', uploaded: '2026-06-03', file: 'weekly/OK188KH_W21_20260525_20260531.html' },
    { brand: '17WINKH', type: 'weekly',  title: 'Week 21',  date: '2026-05-25 ~ 2026-05-31', uploaded: '2026-06-03', file: 'weekly/17WINKH_W21_20260525_20260531.html' },
    { brand: 'OK188KH', type: 'monthly', title: 'May 2026', date: '2026-05-01 ~ 2026-05-31', uploaded: '2026-06-03', file: 'monthly/OK188KH_May2026.html' },
    { brand: '17WINKH', type: 'monthly', title: 'May 2026', date: '2026-05-01 ~ 2026-05-31', uploaded: '2026-06-03', file: 'monthly/17WINKH_May2026.html' },
    { brand: 'OK188KH', type: 'weekly',  title: 'Week 22',  date: '2026-06-01 ~ 2026-06-07', uploaded: '2026-06-11', file: 'weekly/W22_OK188KH_20260601_20260607.html' },
    { brand: '17WINKH', type: 'weekly',  title: 'Week 22',  date: '2026-06-01 ~ 2026-06-07', uploaded: '2026-06-11', file: 'weekly/W22_17WINKH_20260601_20260607.html' },
    { brand: 'SBKH',    type: 'weekly',  title: 'Week 22',  date: '2026-06-01 ~ 2026-06-07', uploaded: '2026-06-11', file: 'weekly/W22_SBKH_20260601_20260607.html' },
    { brand: 'OK188KH', type: 'weekly',  title: 'Week 23',  date: '2026-06-08 ~ 2026-06-14', uploaded: '2026-06-16', file: 'weekly/W23_OK188KH_20260608_20260614.html' },
    { brand: '17WINKH', type: 'weekly',  title: 'Week 23',  date: '2026-06-08 ~ 2026-06-14', uploaded: '2026-06-16', file: 'weekly/W23_17WINKH_20260608_20260614.html' },
    { brand: 'SBKH',    type: 'weekly',  title: 'Week 23',  date: '2026-06-08 ~ 2026-06-14', uploaded: '2026-06-16', file: 'weekly/W23_SBKH_20260608_20260614.html' },
    { brand: 'OK188KH', type: 'weekly',  title: 'Week 24',  date: '2026-06-15 ~ 2026-06-21', uploaded: '2026-06-22', file: 'weekly/W24_OK188KHt_20260615_20260621.html' },
    { brand: '17WINKH', type: 'weekly',  title: 'Week 24',  date: '2026-06-15 ~ 2026-06-21', uploaded: '2026-06-22', file: 'weekly/W24_17WINKH_20260615_20260621.html' },
    { brand: 'SBKH',    type: 'weekly',  title: 'Week 24',  date: '2026-06-15 ~ 2026-06-21', uploaded: '2026-06-22', file: 'weekly/W24_SBKH_20260615_20260621.html' },
    { brand: 'OK188KH', type: 'weekly',  title: 'Week 25',  date: '2026-06-22 ~ 2026-06-28', uploaded: '2026-07-02', file: 'weekly/W25_OK188KH_20260622_20260628.html' },
    { brand: '17WINKH', type: 'weekly',  title: 'Week 25',  date: '2026-06-22 ~ 2026-06-28', uploaded: '2026-07-02', file: 'weekly/W25_17WINKH_20260622_20260628.html' },
    { brand: 'OK188KH', type: 'monthly', title: 'Jun 2026', date: '2026-06-01 ~ 2026-06-30', uploaded: '2026-07-02', file: 'monthly/OK188KH_Jun2026.html' },
    { brand: '17WINKH', type: 'monthly', title: 'Jun 2026', date: '2026-06-01 ~ 2026-06-30', uploaded: '2026-07-02', file: 'monthly/17WINKH_Jun2026.html' },
  ];
  // ══════════════════════════════════════════════════

  let currentFile = null;

  function loadReport(r, isTrend = false) {
    currentFile = r;

    document.querySelectorAll('.nav-link, .trend-link').forEach(el => el.classList.remove('active'));
    document.querySelectorAll(`[data-file="${r.file}"]`).forEach(el => el.classList.add('active'));

    document.getElementById('search-results').classList.remove('visible');
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('iframe-wrap').classList.add('visible');

    const typeLabel = isTrend ? 'Trend Analysis' : (r.type === 'weekly' ? '周报' : '月报');
    const brandPrefix = isTrend ? '' : `<span>${r.brand}</span> · `;
    document.getElementById('header-breadcrumb').innerHTML =
      `${brandPrefix}${typeLabel} · ${r.title}`;
    document.getElementById('iframe-title').innerHTML =
      isTrend
        ? `<span class="brand-tag">TREND</span>${r.title}`
        : `<span class="brand-tag">${r.brand}</span>${r.title}`;
    document.getElementById('iframe-date').textContent = r.date;

    const btnOpen = document.getElementById('btn-open-tab');
    btnOpen.href = r.file;
    btnOpen.classList.add('visible');

    document.getElementById('report-frame').src = r.file;
  }

  function buildTrendSection() {
    const container = document.getElementById('trend-section');

    const header = document.createElement('div');
    header.className = 'trend-header open';
    header.innerHTML = `
      <div class="trend-header-left">
        <span class="trend-icon">📈</span>
        <span class="trend-label">Trend Analysis</span>
      </div>
      <span class="trend-chevron">▶</span>
    `;

    const body = document.createElement('div');
    body.className = 'trend-body open';

    if (TREND_ANALYSIS.length === 0) {
      const empty = document.createElement('div');
      empty.style.cssText = 'padding:0.4rem 1rem 0.5rem 2rem;font-family:DM Mono,monospace;font-size:0.6rem;color:var(--muted);opacity:0.5;';
      empty.textContent = '暂无报告';
      body.appendChild(empty);
    } else {
      TREND_ANALYSIS.forEach(r => {
        const link = document.createElement('div');
        link.className = 'trend-link';
        link.dataset.file = r.file;
        const shortDate = r.date.split(' ~ ')[1] || '';
        link.innerHTML = `<span>${r.title}</span><span class="trend-link-date">${shortDate}</span>`;
        link.onclick = () => loadReport(r, true);
        body.appendChild(link);
      });
    }

    header.onclick = () => {
      header.classList.toggle('open');
      body.classList.toggle('open');
    };

    container.appendChild(header);
    container.appendChild(body);
  }

  function buildSidebar() {
    const nav = document.getElementById('sidebar-nav');
    const brands = {};
    REPORTS.forEach(r => {
      if (!brands[r.brand]) brands[r.brand] = { weekly: [], monthly: [] };
      brands[r.brand][r.type].push(r);
    });

    Object.keys(brands).forEach((brand, bi) => {
      const section = document.createElement('div');
      section.className = 'brand-section';

      const toggle = document.createElement('div');
      toggle.className = 'brand-toggle' + (bi === 0 ? ' open' : '');
      toggle.innerHTML = `<span class="brand-toggle-name">${brand}</span><span class="brand-chevron">▶</span>`;

      const body = document.createElement('div');
      body.className = 'brand-body' + (bi === 0 ? ' open' : '');

      toggle.onclick = () => {
        toggle.classList.toggle('open');
        body.classList.toggle('open');
      };

      ['weekly', 'monthly'].forEach(type => {
        if (!brands[brand][type].length) return;
        const lbl = document.createElement('div');
        lbl.className = 'type-label-small';
        lbl.textContent = type === 'weekly' ? '周报' : '月报';
        body.appendChild(lbl);

        brands[brand][type].forEach(r => {
          const link = document.createElement('div');
          link.className = `nav-link ${type}`;
          link.dataset.file = r.file;
          link.innerHTML = `<span>${r.title}</span><span class="nav-link-date">${r.date.split(' ~ ')[1] || ''}</span>`;
          link.onclick = () => loadReport(r);
          body.appendChild(link);
        });
      });

      section.appendChild(toggle);
      section.appendChild(body);
      nav.appendChild(section);
    });
  }

  function applySearch() {
    const q = document.getElementById('search-input').value.toLowerCase().trim();
    const resultsEl = document.getElementById('search-results');

    if (!q) {
      resultsEl.classList.remove('visible');
      if (currentFile) {
        document.getElementById('iframe-wrap').classList.add('visible');
        document.getElementById('empty-state').style.display = 'none';
      } else {
        document.getElementById('empty-state').style.display = '';
      }
      return;
    }

    document.getElementById('iframe-wrap').classList.remove('visible');
    document.getElementById('empty-state').style.display = 'none';
    resultsEl.classList.add('visible');

    const allReports = [
      ...TREND_ANALYSIS.map(r => ({ ...r, brand: 'TREND', type: 'trend' })),
      ...REPORTS
    ];

    const matches = allReports.filter(r =>
      (r.brand || '').toLowerCase().includes(q) ||
      r.title.toLowerCase().includes(q) ||
      r.date.includes(q)
    );

    resultsEl.innerHTML = matches.length
      ? matches.map((r, i) => `
          <div class="search-result-item" onclick="loadReportByFile('${r.file}')">
            <span class="sr-brand">${r.brand}</span>
            <span class="sr-title">${r.title}</span>
            <span class="sr-date">${r.date}</span>
            <span class="sr-type">${r.type === 'weekly' ? '周报' : r.type === 'monthly' ? '月报' : 'Trend'}</span>
          </div>
        `).join('')
      : `<div style="padding:2rem;font-family:'DM Mono',monospace;font-size:0.75rem;color:var(--muted)">没有找到匹配的报告</div>`;
  }

  function loadReportByFile(file) {
    const trend = TREND_ANALYSIS.find(r => r.file === file);
    if (trend) { loadReport(trend, true); }
    else {
      const r = REPORTS.find(r => r.file === file);
      if (r) loadReport(r);
    }
    document.getElementById('search-input').value = '';
    applySearch();
  }

  buildTrendSection();
  buildSidebar();
</script>
</body>
</html>
