<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>报告中心</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1a1612;
      --paper: #f5f0e8;
      --accent: #c8401a;
      --accent2: #2a5f8f;
      --muted: #8a7f72;
      --rule: #d4c9b8;
      --sidebar-w: 230px;
      --header-h: 58px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Noto Serif SC', serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      height: var(--header-h);
      background: var(--ink);
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      gap: 1.2rem;
      border-bottom: 3px solid var(--accent);
      flex-shrink: 0;
      z-index: 100;
    }

    .header-logo-wrap {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    .header-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }

    .header-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 900;
      color: var(--paper);
      letter-spacing: -0.02em;
      white-space: nowrap;
      line-height: 1;
    }

    .header-logo span { color: var(--accent); }

    .header-divider {
      width: 1px;
      height: 22px;
      background: rgba(255,255,255,0.15);
    }

    .header-breadcrumb {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: rgba(255,255,255,0.4);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-breadcrumb span {
      color: rgba(255,255,255,0.75);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-left: auto;
    }

    .btn-open {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.35rem 0.8rem;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
      display: none;
    }

    .btn-open:hover { background: rgba(255,255,255,0.18); color: white; }
    .btn-open.visible { display: inline-block; }

    .header-search {
      position: relative;
    }

    #search-input {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      padding: 0.38rem 0.8rem 0.38rem 1.9rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: white;
      width: 160px;
      outline: none;
      transition: all 0.2s;
    }

    #search-input::placeholder { color: rgba(255,255,255,0.3); }
    #search-input:focus { background: rgba(255,255,255,0.13); border-color: rgba(255,255,255,0.35); }

    .search-icon {
      position: absolute;
      left: 0.55rem;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.35);
      font-size: 0.8rem;
      pointer-events: none;
    }

    /* ── BODY LAYOUT ── */
    .body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    aside {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: white;
      border-right: 1px solid var(--rule);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-latest {
      padding: 0.9rem 1rem;
      border-bottom: 1px solid var(--rule);
      background: var(--paper);
    }

    .sidebar-section-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    .latest-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    .latest-pill {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      padding: 0.25rem 0.55rem;
      border: 1px solid var(--rule);
      background: white;
      color: var(--ink);
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }

    .latest-pill:hover,
    .latest-pill.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem 0 1.5rem;
    }

    .brand-section { margin-bottom: 0.2rem; }

    .brand-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.55rem 1rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.12s;
    }

    .brand-toggle:hover { background: rgba(26,22,18,0.04); }

    .brand-toggle-name {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .brand-chevron {
      font-size: 0.55rem;
      color: var(--muted);
      transition: transform 0.2s;
    }

    .brand-toggle.open .brand-chevron { transform: rotate(90deg); }

    .brand-body { display: none; }
    .brand-body.open { display: block; }

    .type-label-small {
      font-family: 'DM Mono', monospace;
      font-size: 0.57rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.45rem 1rem 0.15rem 1.6rem;
    }

    .nav-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.32rem 1rem 0.32rem 1.8rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.66rem;
      color: var(--muted);
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: all 0.12s;
      user-select: none;
    }

    .nav-link:hover { color: var(--ink); background: rgba(26,22,18,0.03); }

    .nav-link.active {
      color: var(--accent2);
      border-left-color: var(--accent2);
      background: rgba(42,95,143,0.06);
    }

    .nav-link.active.monthly {
      color: var(--accent);
      border-left-color: var(--accent);
      background: rgba(200,64,26,0.06);
    }

    .nav-link-date {
      font-size: 0.58rem;
      color: var(--rule);
      white-space: nowrap;
    }

    .nav-link.active .nav-link-date { color: inherit; opacity: 0.6; }

    /* ── MAIN PANEL ── */
    .main-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--paper);
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      color: var(--muted);
    }

    .empty-icon {
      font-size: 2.5rem;
      opacity: 0.3;
    }

    .empty-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: var(--ink);
      opacity: 0.3;
    }

    .empty-sub {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      opacity: 0.6;
    }

    /* iframe wrapper */
    .iframe-wrap {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    .iframe-wrap.visible { display: flex; }

    .iframe-toolbar {
      height: 36px;
      background: white;
      border-bottom: 1px solid var(--rule);
      display: flex;
      align-items: center;
      padding: 0 1rem;
      gap: 0.8rem;
      flex-shrink: 0;
    }

    .iframe-title {
      font-family: 'DM Mono', monospace;
      font-size: 0.66rem;
      color: var(--ink);
      flex: 1;
    }

    .iframe-title .brand-tag {
      color: var(--muted);
      margin-right: 0.4rem;
    }

    .iframe-date {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      color: var(--muted);
    }

    #report-frame {
      flex: 1;
      border: none;
      background: white;
    }

    /* search results */
    .search-results {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: none;
    }

    .search-results.visible { display: block; }

    .search-result-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1rem;
      background: white;
      border: 1px solid var(--rule);
      margin-bottom: 1px;
      cursor: pointer;
      transition: background 0.12s;
    }

    .search-result-item:hover { background: #fffdf9; }

    .sr-brand {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      width: 70px;
      flex-shrink: 0;
    }

    .sr-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 0.88rem;
      font-weight: 600;
      flex: 1;
    }

    .sr-date {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      color: var(--muted);
    }

    .sr-type {
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      padding: 0.15rem 0.5rem;
      border: 1px solid var(--rule);
      color: var(--muted);
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-logo-wrap">
    <div class="header-eyebrow">Report Portal</div>
    <div class="header-logo">报告<span>中心</span></div>
  </div>
  <div class="header-divider"></div>
  <div class="header-breadcrumb" id="header-breadcrumb">← 选择左侧报告预览</div>
  <div class="header-actions">
    <a class="btn-open" id="btn-open-tab" href="#" target="_blank">↗ 新标签打开</a>
    <div class="header-search">
      <span class="search-icon">⌕</span>
      <input id="search-input" type="text" placeholder="搜索…" oninput="applySearch()" />
    </div>
  </div>
</header>

<!-- BODY -->
<div class="body">

  <!-- SIDEBAR -->
  <aside>
    <div class="sidebar-nav" id="sidebar-nav"></div>
  </aside>

  <!-- MAIN PANEL -->
  <div class="main-panel">

    <!-- Empty state -->
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">📄</div>
      <div class="empty-title">选择一份报告</div>
      <div class="empty-sub">从左侧选择报告，将在此处直接预览</div>
    </div>

    <!-- Search results -->
    <div class="search-results" id="search-results"></div>

    <!-- iframe -->
    <div class="iframe-wrap" id="iframe-wrap">
      <div class="iframe-toolbar">
        <div class="iframe-title" id="iframe-title"></div>
        <div class="iframe-date" id="iframe-date"></div>
      </div>
      <iframe id="report-frame" src="" title="报告预览"></iframe>
    </div>

  </div>
</div>

<script>
  // ══════════════════════════════════════════════════
  //  ✏️  在这里添加你的报告（最新的放最上面）
  // ══════════════════════════════════════════════════
  const REPORTS = [
  { brand: 'OK188KH', type: 'weekly',  title: 'Week 21',  date: '2026-05-25 ~ 2026-05-31', uploaded: '2026-06-03', file: 'weekly/OK188KH_W21_20260525_20260531.html' },
  { brand: '17WINKH', type: 'weekly',  title: 'Week 21',  date: '2026-05-25 ~ 2026-05-31', uploaded: '2026-06-03', file: 'weekly/17WINKH_W21_20260525_20260531.html' },
  { brand: 'OK188KH', type: 'monthly', title: 'May 2026', date: '2026-05-01 ~ 2026-05-31', uploaded: '2026-06-03', file: 'monthly/OK188KH_May2026.html' },
  { brand: '17WINKH', type: 'monthly', title: 'May 2026', date: '2026-05-01 ~ 2026-05-31', uploaded: '2026-06-03', file: 'monthly/17WINKH_May2026.html' },
  { brand: 'OK188KH', type: 'weekly',  title: 'Week 22',  date: '2026-06-01 ~ 2026-06-07', uploaded: '2026-06-11', file: 'weekly/W22_OK188KH_20260601_20260607.html' },
  { brand: '17WINKH', type: 'weekly',  title: 'Week 22',  date: '2026-06-01 ~ 2026-06-07', uploaded: '2026-06-11', file: 'weekly/W22_17WINKH_20260601_20260607.html' },
  { brand: 'SBKH', type: 'weekly',  title: 'Week 22',  date: '2026-06-01 ~ 2026-06-07', uploaded: '2026-06-11', file: 'weekly/W22_SBKH_20260601_20260607.html' },
];
  // ══════════════════════════════════════════════════

  let currentFile = null;

  function loadReport(r) {
    currentFile = r;

    // Update all active states
    document.querySelectorAll('.nav-link, .latest-pill').forEach(el => el.classList.remove('active'));
    document.querySelectorAll(`[data-file="${r.file}"]`).forEach(el => el.classList.add('active'));

    // Hide search, show iframe
    document.getElementById('search-results').classList.remove('visible');
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('iframe-wrap').classList.add('visible');

    // Update header
    document.getElementById('header-breadcrumb').innerHTML =
      `<span>${r.brand}</span> · ${r.type === 'weekly' ? '周报' : '月报'} · ${r.title}`;
    document.getElementById('iframe-title').innerHTML =
      `<span class="brand-tag">${r.brand}</span>${r.title}`;
    document.getElementById('iframe-date').textContent = r.date;

    const btnOpen = document.getElementById('btn-open-tab');
    btnOpen.href = r.file;
    btnOpen.classList.add('visible');

    document.getElementById('report-frame').src = r.file;
  }

  function buildLatestPills() {
    const seen = new Set();
    const latest = REPORTS.filter(r => {
      const key = r.brand + r.type;
      if (seen.has(key)) return false;
      seen.add(key); return true;
    });

    const container = document.getElementById('latest-pills');
    latest.forEach(r => {
      const pill = document.createElement('div');
      pill.className = 'latest-pill';
      pill.dataset.file = r.file;
      pill.textContent = `${r.brand} ${r.type === 'weekly' ? 'W' : 'M'}`;
      pill.title = `${r.brand} · ${r.title}`;
      pill.onclick = () => loadReport(r);
      container.appendChild(pill);
    });

    // Show last updated
    const label = document.querySelector('.sidebar-section-label');
    if (REPORTS.length > 0) {
      label.textContent = `▶ 最新  ·  更新于 ${REPORTS[0].uploaded}`;
    }
  }

  function buildSidebar() {
    const nav = document.getElementById('sidebar-nav');
    const brands = {};
    REPORTS.forEach(r => {
      if (!brands[r.brand]) brands[r.brand] = { weekly: [], monthly: [] };
      brands[r.brand][r.type].push(r);
    });

    Object.keys(brands).forEach((brand, bi) => {
      const section = document.createElement('div');
      section.className = 'brand-section';

      const toggle = document.createElement('div');
      toggle.className = 'brand-toggle' + (bi === 0 ? ' open' : '');
      toggle.innerHTML = `<span class="brand-toggle-name">${brand}</span><span class="brand-chevron">▶</span>`;

      const body = document.createElement('div');
      body.className = 'brand-body' + (bi === 0 ? ' open' : '');

      toggle.onclick = () => {
        toggle.classList.toggle('open');
        body.classList.toggle('open');
      };

      ['weekly', 'monthly'].forEach(type => {
        if (!brands[brand][type].length) return;
        const lbl = document.createElement('div');
        lbl.className = 'type-label-small';
        lbl.textContent = type === 'weekly' ? '周报' : '月报';
        body.appendChild(lbl);

        brands[brand][type].forEach(r => {
          const link = document.createElement('div');
          link.className = `nav-link ${type}`;
          link.dataset.file = r.file;
          link.innerHTML = `<span>${r.title}</span><span class="nav-link-date">${r.date.split(' ~ ')[1] || ''}</span>`;
          link.onclick = () => loadReport(r);
          body.appendChild(link);
        });
      });

      section.appendChild(toggle);
      section.appendChild(body);
      nav.appendChild(section);
    });
  }

  function applySearch() {
    const q = document.getElementById('search-input').value.toLowerCase().trim();
    const resultsEl = document.getElementById('search-results');

    if (!q) {
      resultsEl.classList.remove('visible');
      if (currentFile) {
        document.getElementById('iframe-wrap').classList.add('visible');
        document.getElementById('empty-state').style.display = 'none';
      } else {
        document.getElementById('empty-state').style.display = '';
      }
      return;
    }

    document.getElementById('iframe-wrap').classList.remove('visible');
    document.getElementById('empty-state').style.display = 'none';
    resultsEl.classList.add('visible');

    const matches = REPORTS.filter(r =>
      r.brand.toLowerCase().includes(q) ||
      r.title.toLowerCase().includes(q) ||
      r.date.includes(q)
    );

    resultsEl.innerHTML = matches.length
      ? matches.map((r, i) => `
          <div class="search-result-item" data-idx="${i}" onclick="loadReportByFile('${r.file}')">
            <span class="sr-brand">${r.brand}</span>
            <span class="sr-title">${r.title}</span>
            <span class="sr-date">${r.date}</span>
            <span class="sr-type">${r.type === 'weekly' ? '周报' : '月报'}</span>
          </div>
        `).join('')
      : `<div style="padding:2rem;font-family:'DM Mono',monospace;font-size:0.75rem;color:var(--muted)">没有找到匹配的报告</div>`;
  }

  function loadReportByFile(file) {
    const r = REPORTS.find(r => r.file === file);
    if (r) {
      loadReport(r);
      document.getElementById('search-input').value = '';
      applySearch();
    }
  }

  buildSidebar();
</script>
</body>
</html>
